# ==============================================================================
# Immich Stack — Docker Compose Profile
#
# ML features (immich-machine-learning) are intentionally DISABLED in this
# profile due to strict host memory constraints (8GB MacBook Air M2 with a
# 3GB budget for containers). Re-enable in a future increment when migrating
# to a Raspberry Pi SSD stack or a host with more available RAM.
#
# Resource budget (combined limits must not exceed 3GB RAM / 2 CPU cores):
#   immich-server  → 1.5GB RAM, 1.0 CPU
#   postgres       → 1.0GB RAM, 0.75 CPU
#   redis          → 256MB RAM, 0.25 CPU
#   ─────────────────────────────────────
#   Total          → ~2.75GB RAM, 2.0 CPU  ✓
# ==============================================================================

name: snap-sync

services:

  # ----------------------------------------------------------------------------
  # Immich Server
  # Handles API requests, background jobs, and asset management.
  # ----------------------------------------------------------------------------
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "2283:2283"
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_URL: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOSTNAME}:5432/${DB_DATABASE_NAME}"
      REDIS_HOSTNAME: ${REDIS_HOSTNAME}
      REDIS_PORT: ${REDIS_PORT}
      # ML is disabled — set endpoint to empty to prevent server from contacting it
      IMMICH_MACHINE_LEARNING_ENABLED: "false"
    deploy:
      resources:
        limits:
          memory: 1536M # 1.5 GB
          cpus: "1.0"
        reservations:
          memory: 512M

  # ----------------------------------------------------------------------------
  # PostgreSQL
  # Stores all Immich metadata. Pinned to the version Immich officially supports.
  # Data path should reside on the internal SSD for fast metadata I/O.
  # ----------------------------------------------------------------------------
  postgres:
    container_name: ${DB_HOSTNAME}
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    restart: unless-stopped
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    healthcheck:
      test: >-
        pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1; Chksum="$$(psql --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" --tuples-only --no-align --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')"; echo "checksum failure count - $${Chksum}"; [ "$${Chksum}" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m
    deploy:
      resources:
        limits:
          memory: 1024M # 1.0 GB
          cpus: "0.75"
        reservations:
          memory: 256M

  # ----------------------------------------------------------------------------
  # Redis
  # Used for job queuing and caching between Immich services.
  # ----------------------------------------------------------------------------
  redis:
    container_name: ${REDIS_HOSTNAME}
    image: docker.io/redis:6.2-alpine
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M # 256 MB
          cpus: "0.25"
        reservations:
          memory: 64M
