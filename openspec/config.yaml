schema: spec-driven

context: |
  # Snap Sync

  ## Vision
  Build a personal, self-hosted Google Photos-like setup, with Immich as the primary product behavior and this repo as a thin integration/control layer.

  ## Strategic posture (non-negotiable)
  - Use native Immich behavior by default.
  - Add custom NestJS/SvelteKit logic only for explicit, validated gaps.
  - Do not build custom features that duplicate stable Immich workflows unless there is a measurable need.

  ## Source-of-truth stack
  - Immich deployment: Docker Compose services (server, microservices/ML, Redis, PostgreSQL).
  - Storage model: photo assets on external SSD, metadata-heavy DB path on internal SSD.
  - Optional custom layer: NestJS APIs + SvelteKit dashboard, generated SDK from OpenAPI.
  - Workflow: SDD (contract first), DTO-driven API updates.

  ## Constraints and invariants
  - Performance: DB metadata path remains on internal SSD for ingestion performance.
  - Security: remote access is TLS-terminated via reverse proxy (Caddy or Nginx).
  - Resilience: 3-2-1 backup policy with automated off-site sync to S3-compatible target.
  - Delivery principle: default to Immich-native actions for ingest/sync/cleanup; custom code is exception-path only.

  ## Practical roadmap shape
  1) Harden Immich operations first (compose reliability, storage, TLS, backup, observability).
  2) Add thin custom APIs/UI for operational visibility or workflows Immich does not cover.
  3) Keep generated SDK and UI in sync only when custom endpoints are truly required.

  ## Working conventions
  - Prefer minimal, focused diffs.
  - After custom API changes: refresh `core/specs/openapi.json`, then run `npm run generate:sdk`.
  - Keep OpenSpec artifacts aligned with this Immich-first strategy.
